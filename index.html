<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>W.O.G.A - Under Construction</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #0b0b0b;
    color: #f5f5f5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* HEADER */
header {
    padding: 25px 40px;
    font-size: 20px;
    font-weight: 600;
    color: #d4af37; /* gold */
}

/* HERO SECTION */
.hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px;
    max-width: 900px;
}

/* CONE */
.cone {
    font-size: 90px;
    margin-bottom: 20px;
}

/* TEXT */
h1 {
    font-size: 52px;
    margin: 10px 0;
}

p {
    color: #bbb;
    font-size: 20px;
    line-height: 1.6;
    max-width: 600px;
}

/* BUTTONS */
.buttons {
    margin-top: 30px;
}

.buttons a {
    display: inline-block;
    margin-right: 15px;
    padding: 12px 26px;
    text-decoration: none;
    font-weight: 600;
    border-radius: 6px;
    transition: 0.2s;
}

/* GOLD BUTTON */
.primary {
    background: #d4af37;
    color: #000;
}

.primary:hover {
    background: #b8962e;
}

/* OUTLINE BUTTON */
.secondary {
    border: 1px solid #d4af37;
    color: #d4af37;
}

.secondary:hover {
    background: #d4af37;
    color: #000;
}

/* FOOTER */
footer {
    padding: 20px 40px;
    color: #777;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
W.O.G.A
</header>

<div class="hero">

<div class="cone">🚧</div>

<h1>Website Under Construction</h1>

<p>
We’re currently building something better for you.<br>
Our new website will be launching soon.
</p>

<div class="buttons">
    <a href="https://www.instagram.com/woga.my/" class="primary">Instagram</a>
    <a href="#" class="secondary">Contact Us</a>
</div>

</div>

<footer>
© 2026 W.O.G.A - World Of Golf Affairs
</footer>

</body>
</html>
